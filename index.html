<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>유찬이 첫 번째 생일파티에 초대합니다</title>
  <meta name="description" content="2026.08.01 Saturday 12:00 PM, 신라스테이 서초 3F" />
  <meta property="og:title" content="유찬이 첫 번째 생일파티에 초대합니다" />
  <meta property="og:description" content="2026.08.01 Saturday 12:00 PM · 신라스테이 서초 3F" />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#fbfaf7" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Maru+Buri:wght@300;400;500&family=Pretendard:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fbfaf7;
      --paper: #fffefb;
      --ink: #2d2a27;
      --muted: #8d8981;
      --line: #e9e3d8;
      --gold: #b89452;
      --gold-deep: #9b793d;
      --shadow: 0 16px 40px rgba(39, 35, 29, .10);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: radial-gradient(circle at 50% 0%, #ffffff 0%, var(--bg) 46%, #f7f3ed 100%);
      color: var(--ink);
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      word-break: keep-all;
      -webkit-font-smoothing: antialiased;
    }
    .page {
      width: min(100%, 520px);
      margin: 0 auto;
      min-height: 100vh;
      background: linear-gradient(180deg, #fffefb 0%, #fbfaf7 100%);
      overflow: hidden;
      opacity: 0;
      transform: translateY(10px);
      animation: pageFade .95s ease forwards;
    }
    @keyframes pageFade { to { opacity: 1; transform: translateY(0); } }
    section { padding: 0 28px; text-align: center; }
    .hero { padding-top: 54px; }
    .eyebrow {
      font-family: 'Cormorant Garamond', serif;
      letter-spacing: .34em;
      color: var(--gold);
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 18px;
    }
    .tiny-line { width: 32px; height: 1px; margin: 0 auto 38px; background: var(--gold); opacity: .75; }
    h1 {
      font-family: 'Maru Buri', 'Noto Serif KR', serif;
      font-size: clamp(28px, 7vw, 40px);
      line-height: 1.55;
      font-weight: 400;
      letter-spacing: .02em;
      margin: 0 0 26px;
    }
    .date {
      font-family: 'Cormorant Garamond', serif;
      color: var(--gold-deep);
      font-size: 31px;
      letter-spacing: .18em;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .time {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      letter-spacing: .08em;
      margin-bottom: 28px;
    }
    .hero-img-wrap {
      margin: 0 -28px;
      position: relative;
      line-height: 0;
    }
    .hero-img {
      width: 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
    .hero-img-wrap::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 70px;
      background: linear-gradient(180deg, rgba(255,254,251,0), #fffefb 78%);
    }
    .section-block { padding-top: 48px; padding-bottom: 18px; }
    .leaf { color: #a7aa8d; font-size: 27px; margin-bottom: 18px; opacity: .78; }
    .dday-label {
      font-family: 'Maru Buri', serif;
      font-size: 19px;
      letter-spacing: .08em;
      margin-bottom: 10px;
    }
    #dday {
      font-family: 'Cormorant Garamond', serif;
      font-size: 64px;
      line-height: 1;
      color: var(--gold);
      font-weight: 500;
      letter-spacing: .07em;
      margin-bottom: 24px;
    }
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--gold);
      margin: 20px auto 35px;
      max-width: 280px;
    }
    .divider::before, .divider::after { content: ''; height: 1px; background: var(--line); flex: 1; }
    .message {
      font-family: 'Maru Buri', serif;
      font-size: 17px;
      line-height: 2.25;
      letter-spacing: .04em;
      margin: 0 auto 42px;
    }
    .info {
      width: min(100%, 360px);
      margin: 0 auto 30px;
      text-align: left;
      border-top: 1px dashed var(--line);
      border-bottom: 1px dashed var(--line);
      padding: 24px 0 22px;
    }
    .row {
      display: grid;
      grid-template-columns: 46px 64px 1fr;
      gap: 10px;
      align-items: center;
      margin: 18px 0;
      font-family: 'Maru Buri', serif;
      font-size: 17px;
      line-height: 1.7;
    }
    .icon { color: var(--gold); font-size: 26px; text-align: center; }
    .label { color: #4d4740; }
    .value { color: var(--ink); }
    .map-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: min(100%, 365px);
      margin: 28px auto 54px;
      min-height: 58px;
      border-radius: 999px;
      background: #fff;
      box-shadow: var(--shadow);
      border: 1px solid rgba(184,148,82,.14);
      color: var(--gold-deep);
      text-decoration: none;
      font-family: 'Maru Buri', serif;
      font-size: 18px;
      transition: transform .18s ease, box-shadow .18s ease;
    }
    .map-btn:active { transform: scale(.985); box-shadow: 0 10px 22px rgba(39,35,29,.10); }
    .thanks {
      font-family: 'Maru Buri', serif;
      color: #37322e;
      font-size: 18px;
      line-height: 2.15;
      letter-spacing: .04em;
      padding-bottom: calc(56px + env(safe-area-inset-bottom));
    }
    .fade-up {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity .8s ease, transform .8s ease;
    }
    .fade-up.show { opacity: 1; transform: translateY(0); }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .page, .fade-up { animation: none; transition: none; opacity: 1; transform: none; }
    }
  </style>
</head>

  <script>
    function getKstDateParts(date) {
      const formatter = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Asia/Seoul', year: 'numeric', month: '2-digit', day: '2-digit'
      });
      const parts = formatter.formatToParts(date).reduce((acc, part) => {
        acc[part.type] = part.value;
        return acc;
      }, {});
      return { year: Number(parts.year), month: Number(parts.month), day: Number(parts.day) };
    }

    function toUtcMidnight({ year, month, day }) {
      return Date.UTC(year, month - 1, day);
    }

    function updateDday() {
      const today = toUtcMidnight(getKstDateParts(new Date()));
      const eventDay = Date.UTC(2026, 7, 1); // 2026-08-01
      const diff = Math.ceil((eventDay - today) / 86400000);
      const el = document.getElementById('dday');
      if (diff > 0) el.textContent = `D-${diff}`;
      else if (diff === 0) el.textContent = 'D-DAY';
      else el.textContent = 'D+' + Math.abs(diff);
    }

    updateDday();

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('show');
      });
    }, { threshold: 0.16 });

    document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
  </script>
</body>
</html>
