<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>유찬이 첫 번째 생일파티에 초대합니다</title>
  <meta name="description" content="2026.08.01 Saturday 12:00 PM · 신라스테이 서초 3F" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="유찬이 첫 번째 생일파티에 초대합니다" />
  <meta property="og:description" content="2026.08.01 Saturday 12:00 PM · 신라스테이 서초 3F" />
  <meta property="og:image" content="./og-image.png" />
  <meta name="theme-color" content="#f8f5ef" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="invite" aria-label="유찬이 돌잔치 초대장">
    <section class="hero fade-in">
      <p class="eyebrow">INVITATION</p>
      <h1>저의 첫 생일파티에 초대합니다</h1>
      <div class="divider" aria-hidden="true"></div>
      <p class="date-main">2026.08.01</p>
      <p class="date-sub">Saturday 12:00 PM</p>
      <figure class="photo-wrap reveal">
        <img src="./yuchan_hero.jpg" alt="유찬이 사진" />
      </figure>
    </section>

    <section class="dday reveal" aria-label="디데이">
      <p>유찬이의 첫 생일까지</p>
      <strong id="dday">D-32</strong>
    </section>

    <section class="parents reveal">
      <p class="parent-line">아빠&nbsp;&nbsp;김근욱</p>
      <p class="and">그리고</p>
      <p class="parent-line">엄마&nbsp;&nbsp;유진주</p>
    </section>

    <section class="message reveal">
      <p>부모라는 이름으로 유찬이를 만난지 벌써 1년</p>
      <p>유찬이 삶의 첫 걸음을 내딛는 자리를</p>
      <p>소중한 분들과 함께 하고자 합니다.</p>
      <p>함께 축하해주세요</p>
    </section>

    <section class="info-card reveal" aria-label="행사 정보">
      <div class="info-row">
        <span class="icon" aria-hidden="true">⌗</span>
        <div>
          <p class="label">일시</p>
          <p>2026.08.01 (토)</p>
          <p>12:00 PM</p>
        </div>
      </div>
      <div class="info-row">
        <span class="icon pin" aria-hidden="true">⌖</span>
        <div>
          <p class="label">장소</p>
          <p>신라스테이 서초 3F</p>
        </div>
      </div>
      <a class="map-button" href="https://m.place.naver.com/restaurant/1316667608/location?entry=plt&filter=location&selected_place_id=1316667608" target="_blank" rel="noopener noreferrer" aria-label="네이버 지도에서 위치 보기">
        <span>⌖</span>
        네이버 지도에서 위치 보기
      </a>
    </section>

    <footer class="closing reveal">
      <p>함께해 주시는 모든 분들께</p>
      <p>진심으로 감사드립니다.</p>
    </footer>
  </main>
  <script src="./script.js"></script>
</body>
</html>
